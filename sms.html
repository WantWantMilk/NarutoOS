<!-- sms.html 短信演示 -->
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>body{background:#1e1e2a;color:white;font-family:sans-serif;margin:0;padding:1rem}.message{background:#2c2c3a;border-radius:22px;padding:0.8rem;margin:0.5rem 0;max-width:80%}.mine{background:#0a6b4f;margin-left:auto}.time{font-size:0.7rem;color:#aaa;margin-top:4px}.input-area{position:fixed;bottom:0;left:0;width:100%;display:flex;background:#2c2c3a;padding:0.5rem;gap:0.5rem}.input-area input{flex:1;border-radius:30px;border:none;padding:0.8rem}</style>
</head>
<body><h2>📨 张三</h2><div class="message">晚上一起吃饭？</div><div class="message mine">好啊，几点？</div><div class="message">七点吧</div><div class="input-area"><input placeholder="文本演示..." value="(演示)"><button>📎</button></div></body>
</html>
