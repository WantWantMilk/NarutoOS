<!-- phone.html 电话演示 -->
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>body{background:#1e1e2a;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column}.dialer{background:#2c2c3a;border-radius:36px;padding:2rem;width:80%;max-width:300px;text-align:center}.number{font-size:2rem;letter-spacing:4px;margin-bottom:1rem}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem}.key{background:#3a3a4a;border-radius:40px;padding:1rem;font-size:1.5rem;transition:0.1s}.key:active{background:#5a5a7a;transform:scale(0.95)}.call-btn{background:#2e8b57;margin-top:1rem;padding:0.8rem;border-radius:40px}</style>
</head>
<body><div class="dialer"><div class="number">+86 123 4567</div><div class="keypad"><div class="key">1</div><div class="key">2</div><div class="key">3</div><div class="key">4</div><div class="key">5</div><div class="key">6</div><div class="key">7</div><div class="key">8</div><div class="key">9</div><div class="key">*</div><div class="key">0</div><div class="key">#</div></div><div class="call-btn">📞 呼叫 演示</div></div></body>
</html>
